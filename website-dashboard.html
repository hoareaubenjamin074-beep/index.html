<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foundation Matrix | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-text { text-shadow: 0 0 10px #ff3b30; color: #ff3b30; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto" data-aos="fade-up">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter neon-text">FOUNDATION MATRIX</h1>
            <div class="px-4 py-2 bg-red-600 rounded-full text-xs font-bold animate-pulse">SYSTEM ONLINE</div>
        </header>

        <div class="glass p-8 rounded-2xl">
            <h2 class="text-2xl mb-6 font-bold">Active Moderation Logs</h2>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-gray-500 border-b border-white/10">
                        <th class="pb-4">USER ID</th>
                        <th class="pb-4">REASON</th>
                        <th class="pb-4">MODERATOR</th>
                        <th class="pb-4">TIMESTAMP</th>
                    </tr>
                </thead>
                <tbody id="logs-container">
                    <tr><td colspan="4" class="py-10 text-center text-gray-500">Connecting to Discord Gateway...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        
        // REPLACER AVEC VOTRE TOKEN ET ID SALON
        const BOT_TOKEN = "DISCORD_TOKEN"; 
        const CHANNEL_ID = "1514965906995019977";

        async function updateLogs() {
            try {
                const res = await fetch(`https://discord.com/api/v10/channels/${CHANNEL_ID}/messages?limit=10`, {
                    headers: { "Authorization": `Bot ${BOT_TOKEN}` }
                });
                const data = await res.json();
                const container = document.getElementById('logs-container');
                container.innerHTML = data.map(msg => `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition">
                        <td class="py-4 font-mono text-red-400">${msg.author.username}</td>
                        <td class="py-4">${msg.content || 'No reason provided'}</td>
                        <td class="py-4 text-gray-400">Moderator Bot</td>
                        <td class="py-4 text-xs text-gray-600">${new Date(msg.timestamp).toLocaleString()}</td>
                    </tr>
                `).join('');
            } catch(e) { console.error("Error fetching logs"); }
        }
        updateLogs();
    </script>
</body>
</html>
